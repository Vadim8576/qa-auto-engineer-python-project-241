<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Demo</title>
  <link rel="stylesheet" type="text/css" href="asciinema_player/asciinema-player.css" />
</head>

<body>
  <p>Demo with json files:</p>
  <div id="json"></div>
  
  <p>Demo with yaml files:</p>
  <div id="yaml"></div>

  <p>Demo plain output format:</p>
  <div id="plain"></div>

  <script src="asciinema_player/asciinema-player.min.js"></script>

  <script>
    // @license magnet:?xt=urn:btih:8e4f440f4c65981c5bf93c76d35135ba5064d8b7&dn=apache-2.0.txt Apache-2.0
    AsciinemaPlayer.create(
      'json.cast',
      document.getElementById('json'),
      { cols: 142, rows: 22 }
    );
    // @license-end
  </script>

  <script>
    // @license magnet:?xt=urn:btih:8e4f440f4c65981c5bf93c76d35135ba5064d8b7&dn=apache-2.0.txt Apache-2.0
    AsciinemaPlayer.create(
      'yaml.cast',
      document.getElementById('yaml'),
      { cols: 142, rows: 22 }
    );
    // @license-end
  </script>
  
  <script>
    // @license magnet:?xt=urn:btih:8e4f440f4c65981c5bf93c76d35135ba5064d8b7&dn=apache-2.0.txt Apache-2.0
    AsciinemaPlayer.create(
      'plain.cast',
      document.getElementById('plain'),
      { cols: 142, rows: 22 }
    );
    // @license-end
  </script>
</body>

</html>
